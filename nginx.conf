events {
  worker_connections 1024;
}

http {
  # When BunkerWeb (or any edge) terminates TLS and hits this nginx over HTTP, preserve the
  # client's original scheme instead of forcing $scheme (which would always be "http" here).
  map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
  }

  # Names distinct from Docker DNS hostnames to avoid confusion in `proxy_pass`.
  upstream hypercity_frontend {
    server frontend:3000;
  }

  upstream hypercity_api {
    server backend:10001;
  }

  server {
    listen 80;
    server_name citysaathi.aeonsan.xyz www.citysaathi.aeonsan.xyz;

    # ^~: prefer this over regex locations; keep full URI (no trailing slash on proxy_pass URL).
    location ^~ /api/ {
      proxy_pass http://hypercity_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    location / {
      proxy_pass http://hypercity_frontend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }
  }
}
